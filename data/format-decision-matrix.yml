# UIAO Format Decision Matrix — When to Use Which Documentation Style
# Version: 1.0
# Date: 2026-04-03
# Human reference: docs/governance/format-decision-matrix.qmd

format_decision_matrix:
  version: "1.0"
  date: "2026-04-03"
  status: "active"
  human_reference: "docs/governance/format-decision-matrix.qmd"

  families:
    - id: "cisco_press"
      name: "Cisco Press"
      domain: "Teaching"
      strengths:
        - "narrative"
        - "examples"
        - "scenarios"

    - id: "microsoft_learn"
      name: "Microsoft Learn"
      domain: "Instruction"
      strengths:
        - "modular_tasks"
        - "product_guidance"
        - "how_to"

    - id: "nist_800"
      name: "NIST 800"
      domain: "Compliance"
      strengths:
        - "controls"
        - "risk_frameworks"
        - "federal_standards"

    - id: "rfc"
      name: "RFCs"
      domain: "Protocol"
      strengths:
        - "protocol_binding"
        - "must_should_may"
        - "ascii_diagrams"

    - id: "uiao_canon"
      name: "UIAO Canon"
      domain: "Governance-Grade Unification"
      strengths:
        - "federated_modernization"
        - "governance_cores"
        - "adapter_contracts"
        - "deterministic"
        - "provenance_first"
        - "claims_not_copies"
        - "drift_resistant"
        - "cross_sector_integration"
        - "appendix_ready"
        - "no_version_drift"

  matrix:
    - use_case: "Teach a concept"
      cisco_press: true
      microsoft_learn: true
      nist_800: false
      rfc: false
      uiao_canon: true
      uiao_note: "If simplified"

    - use_case: "Provide product guidance"
      cisco_press: false
      microsoft_learn: true
      nist_800: false
      rfc: false
      uiao_canon: true

    - use_case: "Define a federal control"
      cisco_press: false
      microsoft_learn: false
      nist_800: true
      rfc: false
      uiao_canon: true

    - use_case: "Specify a protocol"
      cisco_press: false
      microsoft_learn: false
      nist_800: false
      rfc: true
      uiao_canon: true
      uiao_note: "Adapter-level"

    - use_case: "Write a governance spec"
      cisco_press: false
      microsoft_learn: false
      nist_800: true
      rfc: false
      uiao_canon: true
      uiao_note: "Best choice"

    - use_case: "Create an adapter contract"
      cisco_press: false
      microsoft_learn: false
      nist_800: false
      rfc: false
      uiao_canon: true
      uiao_note: "Only correct choice"

    - use_case: "Build a modernization playbook"
      cisco_press: false
      microsoft_learn: true
      nist_800: true
      rfc: false
      uiao_canon: true
      uiao_note: "Canonical"

    - use_case: "Publish a training narrative"
      cisco_press: true
      microsoft_learn: true
      nist_800: false
      rfc: false
      uiao_canon: true
      uiao_note: "Story section only"

    - use_case: "Produce deterministic artifacts"
      cisco_press: false
      microsoft_learn: false
      nist_800: true
      rfc: true
      uiao_canon: true
      uiao_note: "Highest fidelity"
