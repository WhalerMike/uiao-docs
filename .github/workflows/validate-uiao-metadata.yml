name: Validate UIAO Governance Metadata

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'schemas/uiao-governance.schema.json'

jobs:
  validate-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install ajv ajv-formats

      - name: Validate UIAO metadata
        run: node scripts/validate_uiao_metadata.js
