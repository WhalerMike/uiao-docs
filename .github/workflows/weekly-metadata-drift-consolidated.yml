name: Weekly Metadata Drift Consolidated Report

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday at 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || true
          npm install ajv ajv-formats || true

      - name: Run metadata drift scan
        run: node scripts/metadata_drift_scan.js
        env:
          CI: true

      - name: Find latest report
        id: find_report
        run: |
          REPORT=$(ls -1 reports/metadata-drift-*.json 2>/dev/null | tail -n1 || true)
          echo "report=$REPORT" >> $GITHUB_OUTPUT

      - name: Read report JSON
        id: read_report
        run: |
          REPORT="${{ steps.find_report.outputs.report }}"
          if [ -z "$REPORT" ]; then
            echo 'no_report=true' >> $GITHUB_OUTPUT
            exit 0
          fi
          CRITICAL_COUNT=$(jq '.critical | length' "$REPORT")
          HIGH_COUNT=$(jq '.high | length' "$REPORT")
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "report_path=$REPORT" >> $GITHUB_OUTPUT
          CRITICAL_JSON=$(jq -c '.critical' "$REPORT")
          HIGH_JSON=$(jq -c '.high' "$REPORT")
          echo "critical_json<<EOF" >> $GITHUB_OUTPUT
          echo "$CRITICAL_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "high_json<<EOF" >> $GITHUB_OUTPUT
          echo "$HIGH_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update consolidated weekly report issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = process.env.REPORT_PATH;
            if (!reportPath || !fs.existsSync(reportPath)) {
              core.info('No report found, skipping issue creation.');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const date = report.generatedAt.split('T')[0];
            const critLen = report.critical.length;
            const highLen = report.high ? report.high.length : 0;
            const title = '[Metadata Drift Weekly] ' + date + ' -- ' + critLen + ' critical items';
            let body = '# Metadata Drift Weekly Report -- ' + date + '\n\n';
            body += '**Summary**\n\n- **Scan date:** ' + date + '\n- **Critical items:** ' + critLen + '\n- **High items:** ' + highLen + '\n\n---\n\n';
            if (critLen > 0) {
              body += '## Critical Items (action required)\n\n';
              for (const it of report.critical) {
                const shortFile = it.file.split('/').slice(-2).join('/');
                body += '### ' + shortFile + '\n';
                body += '- **File:** ' + it.file + '\n';
                body += '- **Type:** ' + it.type + '\n';
                body += '- **Reason:** ' + it.reason + '\n';
                body += '- **Suggested remediation:** See remediation checklist and use remediation PR template\n\n';
              }
            } else {
              body += 'No critical items detected this week.\n\n';
            }
            if (report.high && report.high.length > 0) {
              body += '---\n\n## High Priority Items\n\n';
              for (const h of report.high) {
                body += '- ' + h.file + ' -- ' + (h.reason || 'stale') + '\n';
              }
              body += '\n';
            }
            body += '---\n\n## Actions Requested\n\n1. Owners please acknowledge items assigned to your team within 72 hours.\n2. If unassigned, governance team to triage and assign owners.\n3. Batch remediation recommended.\n\n';
            body += '**Report:** ' + reportPath + '\n';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'metadata-drift,weekly-report',
              per_page: 100
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              console.log('Updated existing weekly report issue #' + existing.number);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['metadata-drift', 'weekly-report']
              });
              console.log('Created new weekly report issue');
            }
        env:
          REPORT_PATH: ${{ steps.find_report.outputs.report }}
