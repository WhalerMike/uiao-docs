name: Generate UIAO Documents

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'templates/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'visuals/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 🛡 Run Federal Compliance Safety Gate
        run: python scripts/validate_build_readiness.py

      - name: Generate documents from templates
        run: python scripts/generate_docs.py

      - name: 📊 Export GRC Compliance Evidence
        run: python scripts/export_compliance_evidence.py

      - name: Build MkDocs site
        run: mkdocs build

      - name: Commit generated docs and exports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ site/ exports/
          git commit -m "Build: Automated sync of docs and GRC evidence [skip ci]" || echo "No changes to commit"
          git push
