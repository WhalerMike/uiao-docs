name: Generate UIAO Documents

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'templates/**'
      - 'schemas/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jinja2 pyyaml jsonschema markdown

      - name: Generate documents from data
        run: python scripts/generate.py

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git diff --cached --quiet || git commit -m "Auto-generate docs from data [skip ci]"
          git push
