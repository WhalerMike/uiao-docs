name: Fix YAML HR in QMD files (one-shot)

on:
  workflow_dispatch:

  permissions:
    contents: write

    jobs:
      fix-yaml-hr:
          runs-on: ubuntu-latest
              steps:
                    - name: Checkout repository
                            uses: actions/checkout@v4
                                    with:
                                              fetch-depth: 0

                                                    - name: Fix bare --- HR lines in all .qmd files
                                                            run: |
                                                                      python3 -c "
                                                                                import glob

                                                                                          fixed_files = []
                                                                                                    paths = glob.glob('docs/**/*.qmd', recursive=True) + glob.glob('docs/*.qmd')
                                                                                                              for path in paths:
                                                                                                                            with open(path, 'r', encoding='utf-8') as f:
                                                                                                                                              content = f.read()
                                                                                                                                                            if '*Generated by the UIAO-Core Pipeline*' not in content:
                                                                                                                                                                              continue
                                                                                                                                                                                            lines = content.split('\n')
                                                                                                                                                                                                          fm_end = -1
                                                                                                                                                                                                                        if lines and lines[0].strip() == '---':
                                                                                                                                                                                                                                          for i in range(1, len(lines)):
                                                                                                                                                                                                                                                                if lines[i].strip() == '---':
                                                                                                                                                                                                                                                                                          fm_end = i
                                                                                                                                                                                                                                                                                                                    break
                                                                                                                                                                                                                                                                                                                                  if fm_end == -1:
                                                                                                                                                                                                                                                                                                                                                    continue
                                                                                                                                                                                                                                                                                                                                                                  changed = False
                                                                                                                                                                                                                                                                                                                                                                                for i in range(fm_end + 1, len(lines)):
                                                                                                                                                                                                                                                                                                                                                                                                  if lines[i].strip() == '---':
                                                                                                                                                                                                                                                                                                                                                                                                                        lines[i] = '- - -'
                                                                                                                                                                                                                                                                                                                                                                                                                                              changed = True
                                                                                                                                                                                                                                                                                                                                                                                                                                                            if changed:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with open(path, 'w', encoding='utf-8') as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    f.write('\n'.join(lines))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fixed_files.append(path)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print('Fixed: ' + path)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print('Total fixed: ' + str(len(fixed_files)))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Configure git
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Commit fixes and remove this workflow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add docs/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git rm .github/workflows/fix-yaml-hr.yml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if git diff --staged --quiet; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "No changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git commit -m "fix(quarto): replace bare --- HR with - - - in all .qmd files; remove one-shot workflow"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
