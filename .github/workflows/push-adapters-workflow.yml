"""DatabaseAdapter — base class for SQL / ODBC Truth Source adapters."""
from __future__ import annotations

from adapters.base_adapter import (
    BaseAdapter, AdapterMetadata, CanonicalClaim, ClaimFilter,
    DriftReport, KSIBundle, ProvenanceRecord,
)
from typing import Any, List


class DatabaseAdapter(BaseAdapter):
    """Concrete base for database-backed Truth Sources.

    Sub-classes supply connection strings and query templates;
    this class enforces read-only, row-limit, and timeout invariants.
    """

    def __init__(self, dsn: str = ""):
        self._dsn = dsn
        self._connected = False

    async def connect(self, config: dict) -> bool:
        self._dsn = config.get("dsn", self._dsn)
        self._connected = True  # placeholder
        return self._connected

    async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]:
        return []  # sub-class overrides

    async def detect_drift(self) -> DriftReport:
        meta = self.get_metadata()
        return DriftReport(adapter_id=meta.adapter_id)

    async def transform_to_canonical(self, raw: Any) -> CanonicalClaim:
        raise NotImplementedError

    async def generate_lineage(self) -> ProvenanceRecord:
        meta = self.get_metadata()
        return ProvenanceRecord(
            record_id="", adapter_id=meta.adapter_id, source_system=meta.name
        )

    async def generate_ksi_bundle(self) -> KSIBundle:
        meta = self.get_metadata()
        return KSIBundle(bundle_id="", adapter_id=meta.adapter_id)

    def get_metadata(self) -> AdapterMetadata:
        return AdapterMetadata(
            adapter_id="database-generic",
            name="Generic Database Adapter",
            version="0.1.0",
            certification_level=1,
            plane="Management",
            capabilities=["extract", "drift", "provenance"],
        )
PYEOF

