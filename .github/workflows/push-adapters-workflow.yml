# ---------------------------------------------------------------
# Bootstrap Adapter Layer
# Creates the full UIAO adapter scaffold in one commit.
# Uses GITHUB_TOKEN — no PAT required.
# ---------------------------------------------------------------
name: Bootstrap Adapter Layer

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRM'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- adapters/__init__.py ----
      - name: Create adapters/__init__.py
        run: |
          mkdir -p adapters
          cat > adapters/__init__.py << 'PYEOF'
"""UIAO Adapter Registry — auto-discovery of all installed adapters."""
from __future__ import annotations

import importlib
import pkgutil
from typing import Dict, Type

_REGISTRY: Dict[str, Type] = {}


def register(name: str):
    """Class decorator — registers an adapter under *name*."""
    def wrapper(cls):
        _REGISTRY[name] = cls
        return cls
    return wrapper


def get_adapter(name: str):
    """Return the adapter class registered under *name*."""
    if name not in _REGISTRY:
        raise KeyError(f"No adapter registered as '{name}'")
    return _REGISTRY[name]


def list_adapters() -> list[str]:
    """Return sorted list of registered adapter names."""
    return sorted(_REGISTRY.keys())


# Auto-import sub-packages so @register decorators execute on import.
for _importer, _modname, _ispkg in pkgutil.walk_packages(
    path=__path__, prefix=__name__ + "."
):
    importlib.import_module(_modname)
PYEOF

      # ---- adapters/base_adapter.py ----
      - name: Create adapters/base_adapter.py
        run: |
          cat > adapters/base_adapter.py << 'PYEOF'
"""BaseAdapter — abstract contract all UIAO adapters must implement.

See docs/20_AdapterContract.md for the normative specification.
"""
from __future__ import annotations

import abc
import datetime as dt
from dataclasses import dataclass, field
from typing import Any, Dict, List, Optional


@dataclass
class AdapterMetadata:
    """Describes adapter identity and capabilities."""
    adapter_id: str
    name: str
    version: str
    certification_level: int = 0
    plane: str = "unknown"
    capabilities: List[str] = field(default_factory=list)


@dataclass
class CanonicalClaim:
    """A single normalised claim extracted from a Truth Source."""
    claim_id: str
    source_system: str
    claim_type: str
    value: Any
    timestamp: dt.datetime = field(default_factory=dt.datetime.utcnow)
    provenance: Optional[Dict[str, Any]] = None


@dataclass
class DriftReport:
    """Result of a drift-detection pass."""
    adapter_id: str
    checked_at: dt.datetime = field(default_factory=dt.datetime.utcnow)
    drifts: List[Dict[str, Any]] = field(default_factory=list)
    clean: bool = True


@dataclass
class ProvenanceRecord:
    """Full lineage record per 15_ProvenanceProfile.md."""
    record_id: str
    adapter_id: str
    source_system: str
    extracted_at: dt.datetime = field(default_factory=dt.datetime.utcnow)
    hash_sha256: str = ""
    chain: List[str] = field(default_factory=list)


@dataclass
class KSIBundle:
    """Signed evidence bundle (placeholder for KSI integration)."""
    bundle_id: str
    adapter_id: str
    claims_count: int = 0
    signature: str = ""


class ClaimFilter:
    """Simple filter for extract_claims()."""
    def __init__(self, claim_types: Optional[List[str]] = None,
                 since: Optional[dt.datetime] = None):
        self.claim_types = claim_types or []
        self.since = since


class BaseAdapter(abc.ABC):
    """Abstract base class — every UIAO adapter inherits this."""

    # ---- required methods (see 20_AdapterContract.md §2) ----

    @abc.abstractmethod
    async def connect(self, config: dict) -> bool: ...

    @abc.abstractmethod
    async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]: ...

    @abc.abstractmethod
    async def detect_drift(self) -> DriftReport: ...

    @abc.abstractmethod
    async def transform_to_canonical(self, raw: Any) -> CanonicalClaim: ...

    @abc.abstractmethod
    async def generate_lineage(self) -> ProvenanceRecord: ...

    @abc.abstractmethod
    async def generate_ksi_bundle(self) -> KSIBundle: ...

    @abc.abstractmethod
    def get_metadata(self) -> AdapterMetadata: ...

    # ---- invariants ----
    READ_ONLY: bool = True
    MAX_ROWS: int = 10_000
    MAX_QUERY_SECONDS: int = 30
PYEOF

