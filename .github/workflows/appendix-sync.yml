name: Appendix Sync
on:
  pull_request:
    branches: [main]
    paths:
      - "appendices/**"
  push:
    branches: [main]
    paths:
      - "appendices/**"
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  appendix-sync:
    name: Verify Documentation Appendix Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v6
        with:
          path: uiao-docs
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Run appendix audit
        id: audit
        working-directory: uiao-docs
        run: |
          python tools/appendix_indexer.py --path appendices/ --mode audit --output reports/appendix-audit.json --ci
        continue-on-error: true
      - name: Fail on blocking issues
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Appendix audit found BLOCKING issues."
          exit 1
