# <!-- NEW (Proposed) -->
name: Modernization Work Item
description: Track modernization tasks aligned to the 6-month timeline.
title: "[Modernization] <Phase>: <Short Description>"
labels: ["modernization", "program"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Timeline Phase
      options:
        - Month 1 (HLDs)
        - Month 2 (LLDs)
        - Month 3 (Pilots)
        - Month 4 (Expansion)
        - Month 5 (Integration)
        - Month 6 (Compliance Readiness)
    validations:
      required: true
  - type: dropdown
    id: control-plane
    attributes:
      label: Control Plane
      options:
        - Identity
        - Network
        - Addressing
        - Telemetry
        - Security
        - Management
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: Describe the modernization task in detail.
      placeholder: |
        Objective: ...
        Scope: ...
        Success criteria: ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List upstream dependencies and blockers.
      placeholder: |
        Depends on: ...
        Blocked by: ...
  - type: textarea
    id: outputs
    attributes:
      label: Expected Outputs
      description: List deliverables and artifacts.
      placeholder: |
        Deliverables: ...
        Artifacts: ...
        Canon documents affected: ...
