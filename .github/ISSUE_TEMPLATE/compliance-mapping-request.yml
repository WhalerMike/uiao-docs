# <!-- NEW (Proposed) -->
name: Compliance Mapping Request
description: Request updates to FedRAMP, NIST, TIC 3.0, or SCuBA mappings.
title: "[Compliance] <Framework>: <Short Description>"
labels: ["compliance", "crosswalk"]
body:
  - type: dropdown
    id: framework
    attributes:
      label: Which framework?
      options:
        - FedRAMP 20x
        - NIST SP 800-53 Rev 5
        - NIST SP 800-63
        - TIC 3.0 Cloud
        - TIC 3.0 Branch
        - SCuBA
    validations:
      required: true
  - type: textarea
    id: mapping
    attributes:
      label: Mapping Details
      description: Provide the exact control or requirement.
      placeholder: |
        Control ID: ...
        Control Family: ...
        Mapping target: ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence Source
      description: Identify telemetry, identity, addressing, or governance evidence.
      placeholder: |
        Evidence type: ...
        Source system: ...
        Collection method: ...
    validations:
      required: true
  - type: textarea
    id: affected-documents
    attributes:
      label: Affected Canon Documents
      description: Which canonical documents are impacted?
      placeholder: List document numbers (e.g., 03, 09).
