steps:
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: Install Python dependencies
    run: pip install -r requirements.txt

  - name: Run Python tests
    run: python -m pytest tests/ -v

  - name: Run npm test (JS/TS components)
    run: |
      if [ -f package.json ]; then
        npm ci
        npm test
      else
        echo "No package.json found, skipping npm test"
      fi

  - name: Run npm bench (JS/TS components)
    run: |
      if [ -f package.json ]; then
        npm run bench
      else
        echo "No package.json found, skipping npm run bench"
      fi
