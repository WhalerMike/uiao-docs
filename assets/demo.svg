<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Cascadia Code','Fira Code','Consolas','Courier New',monospace" font-size="13">
  <!-- Terminal window chrome -->
  <rect width="860" height="540" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="860" height="36" rx="10" ry="10" fill="#313244"/>
  <rect y="18" width="860" height="18" fill="#313244"/>
  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="430" y="23" text-anchor="middle" fill="#cdd6f4" font-size="12" opacity="0.7">uiao generate-all — terminal</text>

  <!-- Terminal content area -->
  <rect x="0" y="36" width="860" height="504" fill="#1e1e2e"/>

  <!-- Styles -->
  <style>
    .prompt { fill: #89dceb; }
    .cmd    { fill: #cdd6f4; }
    .dim    { fill: #6c7086; }
    .bold   { fill: #cdd6f4; font-weight: bold; }
    .green  { fill: #a6e3a1; }
    .yellow { fill: #f9e2af; }
    .blue   { fill: #89b4fa; font-weight: bold; }
    .red    { fill: #f38ba8; }

    /* Each line fades in on its cue */
    .line { opacity: 0; animation: fadein 0.15s forwards; }

    @keyframes fadein { to { opacity: 1; } }

    /* Blinking cursor */
    .cursor {
      fill: #cdd6f4;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Typing effect for the command line */
    .typed { opacity: 0; animation: fadein 0.08s forwards; }
  </style>

  <!-- ── Prompt + typed command ── -->
  <text x="16" y="68" class="line" style="animation-delay:0.2s">
    <tspan class="prompt">❯ </tspan><tspan class="dim" id="t0"></tspan>
  </text>

  <!-- Characters of "uiao generate-all" typed one at a time -->
  <!-- We fake typing by revealing each char via animation-delay -->
  <text x="32" y="68">
    <tspan class="typed" style="animation-delay:0.3s">u</tspan><tspan class="typed" style="animation-delay:0.38s">i</tspan><tspan class="typed" style="animation-delay:0.46s">a</tspan><tspan class="typed" style="animation-delay:0.54s">o</tspan><tspan class="typed" style="animation-delay:0.62s"> </tspan><tspan class="typed" style="animation-delay:0.70s">g</tspan><tspan class="typed" style="animation-delay:0.78s">e</tspan><tspan class="typed" style="animation-delay:0.86s">n</tspan><tspan class="typed" style="animation-delay:0.94s">e</tspan><tspan class="typed" style="animation-delay:1.02s">r</tspan><tspan class="typed" style="animation-delay:1.10s">a</tspan><tspan class="typed" style="animation-delay:1.18s">t</tspan><tspan class="typed" style="animation-delay:1.26s">e</tspan><tspan class="typed" style="animation-delay:1.34s">-</tspan><tspan class="typed" style="animation-delay:1.42s">a</tspan><tspan class="typed" style="animation-delay:1.50s">l</tspan><tspan class="typed" style="animation-delay:1.58s">l</tspan>
    <tspan class="cursor" style="animation-delay:1.58s">█</tspan>
  </text>

  <!-- ── Pipeline header ── -->
  <text x="16" y="90"  class="line blue"  style="animation-delay:1.9s">━━━ UIAO generate-all ━━━</text>
  <text x="16" y="108" class="line dim"   style="animation-delay:2.0s">Canon: canon/uiao_leadership_briefing_v1.0.yaml  |  Data: data/</text>

  <!-- ── Step 1 ── -->
  <text x="16" y="132" class="line bold"  style="animation-delay:2.2s">[ 1/8 ] Rendering PlantUML diagrams...</text>
  <text x="16" y="150" class="line green" style="animation-delay:2.7s">✓ Rendered 6 diagram(s)</text>

  <!-- ── Step 2 ── -->
  <text x="16" y="174" class="line bold"  style="animation-delay:2.9s">[ 2/8 ] Generating Markdown documentation...</text>
  <text x="16" y="192" class="line green" style="animation-delay:3.5s">✓ Generated 9 document(s) → docs/</text>

  <!-- ── Step 3 ── -->
  <text x="16" y="216" class="line bold"  style="animation-delay:3.7s">[ 3/8 ] Building OSCAL Component Definition...</text>
  <text x="16" y="234" class="line green" style="animation-delay:4.2s">✓ OSCAL CD → exports/oscal/uiao-component-definition.json</text>

  <!-- ── Step 4 ── -->
  <text x="16" y="258" class="line bold"  style="animation-delay:4.4s">[ 4/8 ] Building SSP Skeleton...</text>
  <text x="16" y="276" class="line green" style="animation-delay:4.8s">✓ SSP → exports/oscal/uiao-ssp-skeleton.json</text>

  <!-- ── Step 5 ── -->
  <text x="16" y="300" class="line bold"  style="animation-delay:5.0s">[ 5/8 ] Building POA&amp;M Template...</text>
  <text x="16" y="318" class="line green" style="animation-delay:5.4s">✓ POA&amp;M → exports/oscal/uiao-poam-template.json</text>

  <!-- ── Step 6 ── -->
  <text x="16" y="342" class="line bold"  style="animation-delay:5.6s">[ 6/8 ] Generating DOCX leadership briefing...</text>
  <text x="16" y="360" class="line green" style="animation-delay:6.1s">✓ DOCX → exports/docx/uiao-leadership-briefing.docx</text>

  <!-- ── Step 7 ── -->
  <text x="16" y="384" class="line bold"  style="animation-delay:6.3s">[ 7/8 ] Generating PPTX leadership deck...</text>
  <text x="16" y="402" class="line green" style="animation-delay:6.8s">✓ PPTX → exports/pptx/uiao-leadership-deck.pptx</text>

  <!-- ── Step 8 ── -->
  <text x="16" y="426" class="line bold"  style="animation-delay:7.0s">[ 8/8 ] Generating CycloneDX SBOM...</text>
  <text x="16" y="444" class="line green" style="animation-delay:7.4s">✓ SBOM → exports/sbom/sbom.cyclonedx.json</text>

  <!-- ── Summary ── -->
  <text x="16" y="476" class="line" fill="#a6e3a1" font-weight="bold" style="animation-delay:7.8s">✓ All artifacts generated in 8.3s</text>

  <!-- ── Next prompt ── -->
  <text x="16" y="500" class="line" style="animation-delay:8.2s">
    <tspan class="prompt">❯ </tspan><tspan class="cursor">█</tspan>
  </text>
</svg>
